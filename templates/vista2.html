<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Telemetría - Vista 2</title>
    <style>
        body {
            background-color: midnightblue;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        main { width: 100%; max-width: 700px; }
        h1 { color: mediumpurple; text-align: center; font-size: 2rem; }
        h2 { color: lightslategray; text-align: center; font-size: 1.1rem; border-bottom: 1px solid darkblue; padding-bottom: 15px; }
        nav { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        nav a { padding: 10px 20px; text-decoration: none; border-radius: 6px; font-weight: bold; }

        /* INTERCAMBIO DE IDs PARA NAVEGACIÓN */
        #pestana-inactiva1, #pestana-inactiva2 { background-color: darkblue; color: lightgray; }
        #pestana-activa { background-color: mediumpurple; color: midnightblue; }

        #panel-compañero {
            background-color: rgba(0, 0, 0, 0.2);
            border: 2px dashed mediumpurple;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
        }
        #marcador-x { font-size: 2rem; color: mediumpurple; margin: 10px; }
        #marcador-y { font-size: 2rem; color: lightgray; margin: 10px; }
        #boton-recargar {
            display: block; text-align: center; background-color: darkblue; color: white; padding: 12px; border-radius: 6px; text-decoration: none; margin-top: 20px; font-weight: bold;
        }
    </style>
</head>
<body>
    <main>
        <h1>Visualización de Datos X-Y con Flask</h1>
        <h2>Integración: Vista de [Nombre Compañero 1]</h2>

        <nav>
            <a href="/" id="pestana-inactiva1">Vista Matriz</a>
            <a href="/vista2" id="pestana-activa">Vista Compañero 1</a>
            <a href="/vista3" id="pestana-inactiva2">Vista Compañero 2</a>
        </nav>

        <div id="panel-compañero">
            <h3>Representación Numérica Minimalista</h3>
            <div id="marcador-x">Componente X: <strong>{{ ejeX }}°</strong></div>
            <div id="marcador-y">Componente Y: <strong>{{ ejeY }}°</strong></div>
        </div>

        <a href="/vista2" id="boton-recargar">Refrescar Vista</a>
    </main>
</body>
</html>
